# This is a basic workflow that is manually triggered

name: Update README

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
  schedule:
    # UTC
    - cron: '15 10 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains some jobs
  
  # ===== ===== ===== ===== =====
  # Generate Metrics
  # ===== ===== ===== ===== =====
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Runs a single command using the runners shell
    - name: Current year calendar
      uses: lowlighter/metrics@latest
      with:
        filename: assets/calendar/metrics.plugin.calendar.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: ""
        plugin_calendar: yes

    - name: Most used languages
      uses: lowlighter/metrics@latest
      with:
        filename: assets/languages/metrics.plugin.languages.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: ""
        plugin_languages: yes
        plugin_languages_limit: 8
        plugin_languages_details: percentage, lines
        plugin_languages_indepth: yes

  # ===== ===== ===== ===== =====
  # Generate snake animation
  # ===== ===== ===== ===== =====
  snake_calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - uses: actions/checkout@v4

    - name: Generate snake SVG
      uses: Platane/snk/svg-only@v3
      with:
        github_user_name: ${{ github.repository_owner }}
        outputs: |
          dist/assets/snake/github-contribution-grid-snake.svg
          dist/assets/snake/github-contribution-grid-snake-dark.svg?palette=github-dark

    - name: Push to main branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p assets/snake
        cp -r dist/assets/snake/. assets/snake/
        git add assets/snake/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update snake animation"
        git push