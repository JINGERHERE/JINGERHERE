# This is a basic workflow that is manually triggered

name: Update README

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
  schedule:
    # UTC
    - cron: '15 10 * * *'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains some jobs
  
  # ===== ===== ===== ===== =====
  # Generate Metrics
  # ===== ===== ===== ===== =====
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Current year calendar
    - name: Current year calendar
      uses: lowlighter/metrics@latest
      with:
        filename: assets/calendar/metrics.plugin.calendar.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: ""
        plugin_calendar: yes
    
    # Most used languages
    - name: Most used languages
      uses: lowlighter/metrics@latest
      with:
        filename: assets/languages/metrics.plugin.languages.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: ""
        plugin_languages: yes
        plugin_languages_limit: 8
        plugin_languages_details: percentage
        plugin_languages_indepth: no
        plugin_languages_ignored: Jupyter Notebook, HTML
    
    # Classic template
    - name: Classic template
      uses: lowlighter/metrics@latest
      with:
        filename: assets/classic/metrics.classic.svg
        token: ${{ secrets.METRICS_TOKEN }}
        base: header, repositories
        plugin_lines: yes

  # ===== ===== ===== ===== =====
  # WakaTime Stats
  # ===== ===== ===== ===== =====
  waka-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_TOTAL_CODE_TIME: "True" # Code Time
          SHOW_PROFILE_VIEWS: "False" # Profile Views
          SHOW_LINES_OF_CODE: "True" # Written Lines
          # I'm a Night 🦉
          SHOW_COMMIT: "True"
          # 📅 I'm Most Productive on ...
          SHOW_DAYS_OF_WEEK: "True"
          # 📊 This Week I Spent My Time On
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "False"
          SHOW_OS: "True"
          # 🐱 My GitHub Data
          SHOW_SHORT_INFO: "False"
          SHOW_LANGUAGE_PER_REPO: "False" # I Mostly Code in ...
          SHOW_LOC_CHART: "False" # Timeline chart
          # Last updated on ...
          SHOW_UPDATED_DATE: "True"

  # ===== ===== ===== ===== =====
  # Generate snake animation
  # ===== ===== ===== ===== =====
  snake_calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - uses: actions/checkout@v4

    - name: Generate snake SVG
      uses: Platane/snk/svg-only@v3
      with:
        github_user_name: ${{ github.repository_owner }}
        outputs: |
          dist/assets/snake/github-contribution-grid-snake.svg
          dist/assets/snake/github-contribution-grid-snake-dark.svg?palette=github-dark

    - name: Push to main branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p assets/snake
        cp -r dist/assets/snake/. assets/snake/
        git add assets/snake/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update snake animation"
        git push